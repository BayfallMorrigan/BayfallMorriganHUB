<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firm Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080a0e;
    --bg2: #0d1117;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.15);
    --gold-glow: rgba(201,168,76,0.35);
    --white: #e8e6e1;
    --muted: rgba(232,230,225,0.45);
    --live: #3ddc84;
    --offline: #555;
    --accent: #4a8fff;
    --accent-dim: rgba(74,143,255,0.12);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    color: var(--white);
    overflow: hidden;
    cursor: default;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 36px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(8,10,14,0.97) 0%, transparent 100%);
    backdrop-filter: blur(8px);
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 0.04em;
  }
  .logo span {
    color: var(--muted); font-size: 0.7rem;
    font-family: 'DM Mono', monospace; margin-left: 12px;
  }
  .header-right {
    display: flex; align-items: center; gap: 20px;
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
  }
  .live-badge::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 8px var(--live);
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  #canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .node {
    position: fixed;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
  }
  .node-card {
    position: relative;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: rgba(8,10,14,0.94);
    backdrop-filter: blur(16px);
    min-width: 145px;
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  }
  .node:hover .node-card {
    transform: scale(1.04);
    border-color: rgba(255,255,255,0.18);
  }

  .node.main .node-card {
    border-color: var(--gold);
    min-width: 185px;
    padding: 18px 22px;
    box-shadow: 0 0 28px var(--gold-dim), 0 0 60px rgba(201,168,76,0.07);
  }
  .node.main:hover .node-card {
    box-shadow: 0 0 44px var(--gold-glow), 0 0 90px rgba(201,168,76,0.14);
  }

  .node.capital .node-card {
    border-color: var(--accent);
    min-width: 165px;
    box-shadow: 0 0 22px var(--accent-dim), 0 0 48px rgba(74,143,255,0.05);
  }
  .node.capital:hover .node-card {
    box-shadow: 0 0 36px rgba(74,143,255,0.28), 0 0 70px rgba(74,143,255,0.1);
  }

  .badge {
    position: absolute; top: -9px; right: 12px;
    font-size: 0.52rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--bg); background: var(--accent);
    padding: 2px 7px; border-radius: 2px;
    font-weight: 500;
  }

  .node-label {
    font-family: 'DM Serif Display', serif;
    font-size: 0.95rem;
    color: var(--white);
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .node.main .node-label { font-size: 1.15rem; color: var(--gold); }
  .node.capital .node-label { color: #80b8ff; }

  .node-desc {
    font-size: 0.6rem; color: var(--muted);
    letter-spacing: 0.03em; line-height: 1.5;
    margin-bottom: 10px;
  }

  .node-footer {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
  }

  .status {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.56rem; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .status.live { color: var(--live); }
  .status.live .status-dot { background: var(--live); box-shadow: 0 0 5px var(--live); }
  .status.offline { color: var(--offline); }
  .status.offline .status-dot { background: var(--offline); }
  .status.download { color: #f0a050; }
  .status.download .status-dot { background: #f0a050; box-shadow: 0 0 5px #f0a050; }

  .node.python-tool .node-card {
    border-color: rgba(240,160,80,0.4);
    box-shadow: 0 0 20px rgba(240,160,80,0.08);
  }
  .node.python-tool:hover .node-card {
    border-color: rgba(240,160,80,0.7);
    box-shadow: 0 0 32px rgba(240,160,80,0.2);
  }
  .node.python-tool .node-label { color: #f0b070; }

  .node-type {
    font-size: 0.53rem; letter-spacing: 0.09em; text-transform: uppercase;
    color: rgba(255,255,255,0.18);
  }

  .open-hint {
    position: absolute; bottom: -24px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.54rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.22); white-space: nowrap;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .node:hover .open-hint { opacity: 1; }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 50;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Firm Hub <span>/ internal tools</span></div>
  <div class="header-right">
    <div class="live-badge" id="liveCount">— live</div>
    <div id="clock"></div>
  </div>
</header>

<canvas id="canvas"></canvas>

<script>
// ════════════════════════════════════════════════════════
//  NODES — update labels, URLs, positions, and status here
//  pos: [x%, y%] of the viewport
// ════════════════════════════════════════════════════════
const nodes = [
  {
    id: 'main',
    label: 'Main Website',
    desc: 'Primary company presence',
    type: 'web',
    status: 'live',
    url: 'https://www.bayfallmorrigan.com/',
    cls: 'main',
    pos: [50, 19],
  },
  {
    id: 'capital',
    label: 'Capital Desk',
    desc: 'Live trading & portfolio dashboard',
    type: 'hosted · pw protected',
    status: 'live',
    url: 'https://bayfallmorrigan.github.io/capitaldesk/',
    cls: 'capital',
    pos: [50, 50],
    badge: 'Protected',
  },
  {
    id: 'montecarlo',
    label: 'Monte Carlo Sim',
    desc: 'Probabilistic scenario modelling',
    type: 'tool',
    status: 'live',
    url: 'https://bayfallmorrigan.github.io/Monte-Carlo-/',
    cls: '',
    pos: [70, 48],
  },
  {
    id: 'accsim1',
    label: 'Standard Account Simulator',
    desc: 'Equity curve & risk simulation',
    type: 'tool',
    status: 'live',
    url: 'https://bayfallmorrigan.github.io/Standard-Account-Simulator/',
    cls: '',
    pos: [67, 64],
  },
  {
    id: 'accsim2',
    label: 'Account Build Up Simulator',
    desc: 'Progressive account build methodology',
    type: 'tool',
    status: 'live',
    url: 'https://bayfallmorrigan.github.io/Account-Build-Up-Simulator/',
    cls: '',
    pos: [67, 79],
  },
  {
    id: 'abuyield',
    label: 'ABU Yield Calculator',
    desc: 'Target yield inputs for build-up strategy',
    type: 'tool',
    status: 'live',
    url: 'https://bayfallmorrigan.github.io/ABU-YIELD-CALCULATOR/',
    cls: '',
    pos: [67, 92],
  },
  {
    id: 'dailymover',
    label: 'Daily Mover Scanner',
    desc: 'Finviz top gainers watcher · runs locally',
    type: 'python · local',
    status: 'download',
    url: null,
    download: 'https://github.com/BayfallMorrigan/pythontools/raw/main/daily-mover-scanner.zip',
    cls: 'python-tool',
    pos: [30, 50],
  },
  {
    id: 'backtest',
    label: 'Backtest Scanner',
    desc: 'Signal replay engine · runs locally',
    type: 'python · local',
    status: 'download',
    url: null,
    download: 'https://github.com/BayfallMorrigan/pythontools/raw/main/backtest-scanner.zip',
    cls: 'python-tool',
    pos: [30, 65],
  },
];

// ════════════════════════════════════════════════════════
//  EDGES — pairs of node ids to draw connecting lines
// ════════════════════════════════════════════════════════
const edges = [
  ['main', 'capital'],
  ['main', 'accsim1'],
  ['main', 'accsim2'],
  ['capital', 'montecarlo'],
  ['capital', 'accsim1'],
  ['capital', 'accsim2'],
  ['accsim1', 'accsim2'],
  ['accsim2', 'abuyield'],
  ['capital', 'dailymover'],
  ['capital', 'backtest'],
];

// ════════════════════════════════════════════════════════
//  Build DOM
// ════════════════════════════════════════════════════════
nodes.forEach(n => {
  const el = document.createElement('div');
  el.className = `node ${n.cls || ''}`;
  el.id = `node-${n.id}`;
  el.style.left = n.pos[0] + 'vw';
  el.style.top  = n.pos[1] + 'vh';

  el.innerHTML = `
    <div class="node-card">
      ${n.badge ? `<div class="badge">${n.badge}</div>` : ''}
      <div class="node-label">${n.label}</div>
      <div class="node-desc">${n.desc}</div>
      <div class="node-footer">
        <div class="status ${n.status}">
          <div class="status-dot"></div>${n.status}
        </div>
        <div class="node-type">${n.type}</div>
      </div>
    </div>
    <div class="open-hint">${n.download ? '↓ download zip' : '↗ open'}</div>
  `;

  el.addEventListener('click', () => {
    if (n.download) {
      const a = document.createElement('a');
      a.href = n.download;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    } else if (n.url) {
      window.open(n.url, '_blank');
    }
  });
  document.body.appendChild(el);
});

// ════════════════════════════════════════════════════════
//  Canvas edges with animated traveling dots
// ════════════════════════════════════════════════════════
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
let t = 0;

function nodeCenter(id) {
  const el = document.getElementById(`node-${id}`);
  if (!el) return null;
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  t += 0.0035;

  edges.forEach(([a, b], i) => {
    const p1 = nodeCenter(a);
    const p2 = nodeCenter(b);
    if (!p1 || !p2) return;

    const isGold    = a === 'main'    || b === 'main';
    const isCapital = a === 'capital' || b === 'capital';

    // Line gradient
    const grad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
    if (isGold) {
      grad.addColorStop(0, 'rgba(201,168,76,0.55)');
      grad.addColorStop(1, 'rgba(201,168,76,0.1)');
    } else if (isCapital) {
      grad.addColorStop(0, 'rgba(74,143,255,0.45)');
      grad.addColorStop(1, 'rgba(74,143,255,0.07)');
    } else {
      grad.addColorStop(0, 'rgba(255,255,255,0.1)');
      grad.addColorStop(1, 'rgba(255,255,255,0.03)');
    }

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Traveling dot
    const phase = (t * 0.6 + i * 0.41) % 1;
    const dotX = p1.x + (p2.x - p1.x) * phase;
    const dotY = p1.y + (p2.y - p1.y) * phase;
    const alpha = 0.55 + Math.sin(phase * Math.PI) * 0.45;

    ctx.beginPath();
    ctx.arc(dotX, dotY, 2.5, 0, Math.PI * 2);
    if (isGold)         ctx.fillStyle = `rgba(201,168,76,${alpha})`;
    else if (isCapital) ctx.fillStyle = `rgba(74,143,255,${alpha})`;
    else                ctx.fillStyle = `rgba(255,255,255,${alpha * 0.5})`;
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Wait for layout before first draw
setTimeout(() => requestAnimationFrame(draw), 200);

// ════════════════════════════════════════════════════════
//  Clock + live count
// ════════════════════════════════════════════════════════
function updateClock() {
  const el = document.getElementById('clock');
  el.textContent = new Date().toLocaleTimeString('en-US', {
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false, timeZone: 'America/New_York'
  }) + ' ET';
}
setInterval(updateClock, 1000);
updateClock();

const live = nodes.filter(n => n.status === 'live').length;
document.getElementById('liveCount').textContent = `${live} live`;
</script>
</body>
</html>
