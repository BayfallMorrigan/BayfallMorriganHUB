<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bayfall Morrigan: Proprietary Material Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f6;
    --bg2: #f2f0ec;
    --surface: rgba(0,0,0,0.03);
    --border: #ccc9c2;
    --border-mid: #b5b2aa;
    --black: #080808;
    --mid: #7a7670;
    --rule: #ccc9c2;

    --gold: #8a6a2a;
    --gold-dim: rgba(138,106,42,0.1);
    --gold-glow: rgba(138,106,42,0.22);
    --gold-line: rgba(138,106,42,0.4);

    --accent: #2a4f8a;
    --accent-dim: rgba(42,79,138,0.08);
    --accent-line: rgba(42,79,138,0.35);

    --live: #3d7a50;
    --offline: #aaa8a3;
    --amber: #8a5e2a;

    --display: 'Cormorant Garamond', Georgia, serif;
    --body: 'EB Garamond', Georgia, serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: var(--body);
    color: var(--black);
    overflow: hidden;
    cursor: default;
    -webkit-font-smoothing: antialiased;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 52px;
    height: 72px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg);
  }
  .logo {
    font-family: var(--display);
    font-size: 1.15rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--black);
  }
  .logo span {
    font-family: var(--body);
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid);
    margin-left: 14px;
  }
  .header-right {
    display: flex; align-items: center; gap: 28px;
    font-family: var(--body);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--mid);
  }
  .live-badge {
    display: flex; align-items: center; gap: 7px;
  }
  .live-badge::before {
    content: '';
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--live);
    animation: blink 2.5s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  #canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* subtle grid texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
  }

  .node {
    position: fixed;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
  }
  .node-card {
    position: relative;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--bg);
    min-width: 148px;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.18s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .node:hover .node-card {
    transform: scale(1.035);
    border-color: var(--border-mid);
    box-shadow: 0 4px 18px rgba(0,0,0,0.1);
  }

  /* Main node */
  .node.main .node-card {
    border-color: var(--gold);
    min-width: 190px;
    padding: 18px 22px;
    box-shadow: 0 2px 12px var(--gold-dim);
  }
  .node.main:hover .node-card {
    box-shadow: 0 4px 24px var(--gold-glow);
  }

  /* Capital node */
  .node.capital .node-card {
    border-color: var(--accent);
    min-width: 168px;
    box-shadow: 0 2px 12px var(--accent-dim);
  }
  .node.capital:hover .node-card {
    box-shadow: 0 4px 22px rgba(42,79,138,0.16);
  }

  /* Python tool node */
  .node.python-tool .node-card {
    border-color: rgba(138,94,42,0.45);
    box-shadow: 0 1px 6px rgba(138,94,42,0.06);
  }
  .node.python-tool:hover .node-card {
    border-color: rgba(138,94,42,0.75);
    box-shadow: 0 4px 16px rgba(138,94,42,0.14);
  }
  .node.python-tool .node-label { color: var(--amber); }

  .badge {
    position: absolute; top: -9px; right: 12px;
    font-family: var(--body);
    font-size: 0.5rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--bg); background: var(--accent);
    padding: 2px 7px; border-radius: 1px;
  }

  .node-label {
    font-family: var(--display);
    font-size: 1rem;
    font-weight: 400;
    color: var(--black);
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .node.main .node-label {
    font-size: 1.2rem;
    color: var(--gold);
    font-style: italic;
  }
  .node.capital .node-label { color: var(--accent); }

  .node-desc {
    font-family: var(--body);
    font-size: 0.62rem;
    color: var(--mid);
    letter-spacing: 0.02em;
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .node-footer {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }

  .status {
    display: flex; align-items: center; gap: 5px;
    font-family: var(--body);
    font-size: 0.56rem; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .status.live { color: var(--live); }
  .status.live .status-dot { background: var(--live); }
  .status.offline { color: var(--offline); }
  .status.offline .status-dot { background: var(--offline); }
  .status.download { color: var(--amber); }
  .status.download .status-dot { background: var(--amber); }

  .node-type {
    font-family: var(--body);
    font-size: 0.53rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(0,0,0,0.2);
  }

  .open-hint {
    position: absolute; bottom: -22px; left: 50%;
    transform: translateX(-50%);
    font-family: var(--body);
    font-size: 0.52rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--mid); white-space: nowrap;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .node:hover .open-hint { opacity: 1; }

  /* ────────────────────────────────────────────
     MOBILE — portrait: show rotate prompt
     MOBILE — landscape: show the full graph, scaled down
  ──────────────────────────────────────────── */

  /* Portrait on a phone — show the rotate screen */
  #rotate-prompt {
    display: none;
    position: fixed; inset: 0; z-index: 8000;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  #rotate-prompt::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,0,0,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.022) 1px, transparent 1px);
    background-size: 52px 52px;
  }

  @media (max-width: 900px) and (orientation: portrait) {
    #rotate-prompt { display: flex; }

    /* hide everything else */
    header, #canvas, body::before { display: none !important; }
    .node { display: none !important; }
  }

  /* ── Mobile landscape: pannable infinite canvas ── */
  #mobile-pan-viewport {
    display: none; /* shown by JS in landscape mobile */
    position: fixed;
    top: 48px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    touch-action: none; /* we handle touch manually */
    cursor: grab;
    z-index: 5;
  }
  #mobile-pan-viewport:active { cursor: grabbing; }

  #mobile-pan-world {
    position: absolute;
    width: 1500px;
    height: 960px;
    top: 0; left: 0;
    transform-origin: top left;
    /* translate + scale applied by JS */
  }

  #mobile-pan-canvas {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* nodes inside the pan world are absolute, not fixed */
  #mobile-pan-world .node {
    position: absolute !important;
    transform: translate(-50%, -50%) !important;
    cursor: pointer;
    z-index: 10;
  }

  /* Compact node sizes for mobile */
  #mobile-pan-world .node-card {
    padding: 9px 13px;
    min-width: 118px !important;
    font-size: 0.9rem;
  }
  #mobile-pan-world .node.main .node-card  { min-width: 150px !important; padding: 12px 16px; }
  #mobile-pan-world .node.capital .node-card { min-width: 132px !important; }
  #mobile-pan-world .node-label { font-size: 0.82rem; margin-bottom: 2px; }
  #mobile-pan-world .node.main .node-label { font-size: 0.95rem; }
  #mobile-pan-world .node-desc { font-size: 0.54rem; margin-bottom: 7px; line-height: 1.4; }
  #mobile-pan-world .node-footer { gap: 6px; }
  #mobile-pan-world .status { font-size: 0.5rem; }
  #mobile-pan-world .status-dot { width: 4px; height: 4px; }
  #mobile-pan-world .node-type { font-size: 0.46rem; }
  #mobile-pan-world .badge { font-size: 0.44rem; padding: 1px 5px; top: -7px; right: 8px; }
  #mobile-pan-world .open-hint { display: none; }

  /* mobile header strip */
  @media (max-height: 500px) and (orientation: landscape) {
    header { padding: 0 20px; height: 48px; }
    .logo { font-size: 0.95rem; }
    .logo span { display: none; }
    .header-right { font-size: 0.56rem; gap: 16px; }
    /* hide the fixed desktop nodes & canvas — mobile uses pan world */
    body > .node, #canvas { display: none !important; }
    body::before { display: none !important; }
  }
</style>
</head>
<body>

<header>

  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:320px;padding:0 24px;">
    <div style="font-family:var(--body);font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--mid);margin-bottom:18px;text-align:center;">Internal Apps</div>
    <div style="font-family:var(--display);font-size:2rem;font-weight:300;font-style:italic;color:var(--black);margin-bottom:6px;text-align:center;line-height:1.1;">BAYFALL MORRIGAN: Proprietary Material Hub</div>

      onkeydown="if(event.key==='Enter')_checkPW()">

      style="font-family:var(--body);font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:#f9f8f6;background:#080808;border:1px solid #080808;padding:11px 36px;cursor:pointer;border-radius:1px;width:100%;margin-bottom:12px;">
      Unlock
    </button>
    <div id="pw-error" style="font-family:var(--body);font-size:0.6rem;letter-spacing:0.1em;color:#8a2a2a;height:16px;text-align:center;"></div>

<script>
// ════════════════════════════════════════════════════════
//  SECURITY — SHA-256 hashed password, lockout, hardened session
// ════════════════════════════════════════════════════════
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12') e.preventDefault();
  if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) e.preventDefault();
  if (e.ctrlKey && e.key === 'U') e.preventDefault();
});

const _PH  = '9cd0d30d5bc77e21b8d0c808ca8cdfa8b2ef3ea51c9ee942e0463260c03a3946';
const _SK  = 'hub_e392aff8326a08ebc7b3b3e68787dd69';
const _LK  = 'hub_lock';
const _FA  = 'hub_fails';
const _MAX = 5;
const _LMS = 5 * 60 * 1000;

async function _hash(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function _genToken() {
  const a = new Uint8Array(32); crypto.getRandomValues(a);
  return Array.from(a).map(b => b.toString(16).padStart(2,'0')).join('');
}
function _isLocked()    { return Date.now() < parseInt(sessionStorage.getItem(_LK)||'0'); }
function _remaining()   { return Math.max(0, Math.ceil((parseInt(sessionStorage.getItem(_LK)||'0') - Date.now()) / 1000)); }
function _isAuthed()    { const t = sessionStorage.getItem(_SK); return t && /^[0-9a-f]{64}$/.test(t); }
function _setAuthed()   { sessionStorage.setItem(_SK, _genToken()); sessionStorage.removeItem(_LK); sessionStorage.removeItem(_FA); }

async function _checkPW() {
  if (_isLocked()) {
    document.getElementById('pw-error').textContent = `Too many attempts. Wait ${_remaining()}s.`;
    return;
  }
  const input = document.getElementById('pw-input').value;
  document.getElementById('pw-input').value = '';
  const h = await _hash(input);
  if (h === _PH) {
    _setAuthed();
    document.getElementById('pw-overlay').style.display = 'none';
    init();
  } else {
    const f = parseInt(sessionStorage.getItem(_FA)||'0') + 1;
    sessionStorage.setItem(_FA, f);
    if (f >= _MAX) {
      sessionStorage.setItem(_LK, Date.now() + _LMS);
      document.getElementById('pw-error').textContent = 'Too many attempts. Locked for 5 minutes.';
    } else {
      document.getElementById('pw-error').textContent = `Incorrect. ${_MAX - f} attempt${_MAX - f !== 1 ? 's' : ''} remaining.`;
    }
    document.getElementById('pw-input').focus();
  }
}

// Skip lock screen if already authenticated this session
if (_isAuthed()) {
  document.getElementById('pw-overlay').style.display = 'none';
}

// ════════════════════════════════════════════════════════
//  NODES
// ════════════════════════════════════════════════════════
const nodes = [

const edges = [
  ['main', 'capital'],
  ['main', 'accsim1'],
  ['main', 'accsim2'],
  ['capital', 'montecarlo'],
  ['capital', 'accsim1'],

// ════════════════════════════════════════════════════════
//  Orientation helpers
// ════════════════════════════════════════════════════════
function isPortraitMobile() {
  return window.innerWidth < 900 && window.innerHeight > window.innerWidth;
}
function isLandscapeMobile() {
  return window.innerWidth < 1024 && window.innerHeight <= window.innerWidth && window.innerHeight < 520;
}

function handleClick(n) {
  if (n.download) {
    const a = document.createElement('a');
    a.href = n.download; a.download = '';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  } else if (n.url) {
    window.open(n.url, '_blank');
  }
}

function nodeCardHTML(n) {
  return `
    <div class="node-card">
      ${n.badge ? `<div class="badge">${n.badge}</div>` : ''}
      <div class="node-label">${n.label}</div>
      <div class="node-desc">${n.desc}</div>
      <div class="node-footer">
        <div class="status ${n.status}">
          <div class="status-dot"></div>${n.status}
        </div>
        <div class="node-type">${n.type}</div>
      </div>
    </div>
    <div class="open-hint">${n.download ? '↓ download zip' : '↗ open'}</div>
  `;
}

// ════════════════════════════════════════════════════════
//  DESKTOP — fixed-position nodes + animated canvas
// ════════════════════════════════════════════════════════
const desktopCanvas = document.getElementById('canvas');
const desktopCtx    = desktopCanvas.getContext('2d');
let desktopT = 0;
let desktopAnim = false;

function buildDesktop() {
  document.querySelectorAll('#mobile-pan-world .node').forEach(el => el.remove());
  nodes.forEach(n => {
    let el = document.getElementById(`node-${n.id}`);
    if (!el) {
      el = document.createElement('div');
      el.className = `node ${n.cls || ''}`;
      el.id = `node-${n.id}`;
      el.addEventListener('click', () => handleClick(n));
      document.body.appendChild(el);
    }
    el.style.left = n.pos[0] + 'vw';
    el.style.top  = n.pos[1] + 'vh';
    el.style.position = 'fixed';
    el.style.display  = '';
    el.innerHTML = nodeCardHTML(n);
  });
}

function desktopNodeCenter(id) {
  const el = document.getElementById(`node-${id}`);
  if (!el) return null;
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function drawDesktop() {
  if (!desktopAnim) return;
  desktopCtx.clearRect(0, 0, desktopCanvas.width, desktopCanvas.height);
  desktopT += 0.003;
  edges.forEach(([a, b], i) => {
    const p1 = desktopNodeCenter(a);
    const p2 = desktopNodeCenter(b);
    if (!p1 || !p2) return;
    const isGold    = a === 'main'    || b === 'main';
    const isCapital = a === 'capital' || b === 'capital';
    const grad = desktopCtx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
    if (isGold) { grad.addColorStop(0,'rgba(138,106,42,0.5)'); grad.addColorStop(1,'rgba(138,106,42,0.08)'); }
    else if (isCapital) { grad.addColorStop(0,'rgba(42,79,138,0.42)'); grad.addColorStop(1,'rgba(42,79,138,0.06)'); }
    else { grad.addColorStop(0,'rgba(0,0,0,0.12)'); grad.addColorStop(1,'rgba(0,0,0,0.03)'); }
    desktopCtx.beginPath(); desktopCtx.moveTo(p1.x,p1.y); desktopCtx.lineTo(p2.x,p2.y);
    desktopCtx.strokeStyle = grad; desktopCtx.lineWidth = 1; desktopCtx.stroke();
    const phase = (desktopT * 0.55 + i * 0.41) % 1;
    const dotX  = p1.x + (p2.x - p1.x) * phase;
    const dotY  = p1.y + (p2.y - p1.y) * phase;
    const alpha = 0.5 + Math.sin(phase * Math.PI) * 0.5;
    desktopCtx.beginPath(); desktopCtx.arc(dotX, dotY, 2.2, 0, Math.PI * 2);
    if (isGold) desktopCtx.fillStyle = `rgba(138,106,42,${alpha})`;
    else if (isCapital) desktopCtx.fillStyle = `rgba(42,79,138,${alpha})`;
    else desktopCtx.fillStyle = `rgba(0,0,0,${alpha * 0.3})`;
    desktopCtx.fill();
  });
  requestAnimationFrame(drawDesktop);
}

function resizeDesktopCanvas() {
  desktopCanvas.width  = window.innerWidth;
  desktopCanvas.height = window.innerHeight;
}

// ════════════════════════════════════════════════════════
//  MOBILE LANDSCAPE — pannable world
// ════════════════════════════════════════════════════════
const WORLD_W  = 1500;
const WORLD_H  = 960;
const MOBILE_SCALE = 0.62; // zoomed-out factor — raise to zoom in, lower to zoom out more

const panViewport = document.getElementById('mobile-pan-viewport');
const panWorld    = document.getElementById('mobile-pan-world');
const panCanvas   = document.getElementById('mobile-pan-canvas');
const panCtx      = panCanvas.getContext('2d');
panCanvas.width   = WORLD_W;
panCanvas.height  = WORLD_H;

let panX = 0, panY = 0;
let panT = 0;
let panAnim = false;
let dragging = false, lastTX = 0, lastTY = 0;
let tapStartX = 0, tapStartY = 0, tapMoved = false;

function clampPan(x, y) {
  const vw = window.innerWidth;
  const vh = window.innerHeight - 48;
  // Scaled world dimensions
  const sw = WORLD_W * MOBILE_SCALE;
  const sh = WORLD_H * MOBILE_SCALE;
  return {
    x: Math.max(Math.min(0, vw - sw), Math.min(0, x)),
    y: Math.max(Math.min(0, vh - sh), Math.min(0, y)),
  };
}
function applyPan() {
  panWorld.style.transform = `translate(${panX}px, ${panY}px) scale(${MOBILE_SCALE})`;
}

panViewport.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  e.preventDefault();
  dragging = true; tapMoved = false;
  lastTX = tapStartX = e.touches[0].clientX;
  lastTY = tapStartY = e.touches[0].clientY;
}, { passive: false });

panViewport.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!dragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - lastTX;
  const dy = e.touches[0].clientY - lastTY;
  lastTX = e.touches[0].clientX;
  lastTY = e.touches[0].clientY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) tapMoved = true;
  const c = clampPan(panX + dx, panY + dy);
  panX = c.x; panY = c.y;
  applyPan();
}, { passive: false });

panViewport.addEventListener('touchend', e => {
  dragging = false;
  if (!tapMoved) {
    // Convert screen tap coords to world coords (undo pan + scale)
    const wx = (tapStartX - panX) / MOBILE_SCALE;
    const wy = (tapStartY - panY) / MOBILE_SCALE;
    nodes.forEach(n => {
      const el = document.getElementById(`mob-node-${n.id}`);
      if (!el) return;
      const cx = parseFloat(el.style.left);
      const cy = parseFloat(el.style.top);
      const hw = el.offsetWidth / 2 + 10;
      const hh = el.offsetHeight / 2 + 10;
      if (wx >= cx - hw && wx <= cx + hw && wy >= cy - hh && wy <= cy + hh) {
        handleClick(n);
      }
    });
  }
});

// Block pinch-zoom everywhere on mobile
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

function buildMobilePan() {
  nodes.forEach(n => {
    const el = document.getElementById(`node-${n.id}`);
    if (el && el.parentNode === document.body) el.style.display = 'none';
  });
  panWorld.querySelectorAll('.node').forEach(el => el.remove());

  nodes.forEach(n => {
    const el = document.createElement('div');
    el.className = `node ${n.cls || ''}`;
    el.id = `mob-node-${n.id}`;
    el.style.left = (n.pos[0] / 100) * WORLD_W + 'px';
    el.style.top  = (n.pos[1] / 100) * WORLD_H + 'px';
    el.innerHTML  = nodeCardHTML(n);
    el.addEventListener('click', () => handleClick(n));
    panWorld.appendChild(el);
  });

  // Start centered — account for scale so the graph sits in the middle of the viewport
  const vw = window.innerWidth;
  const vh = window.innerHeight - 48;
  const c = clampPan((vw - WORLD_W * MOBILE_SCALE) / 2, (vh - WORLD_H * MOBILE_SCALE) / 2);
  panX = c.x; panY = c.y;
  applyPan();
  panViewport.style.display = 'block';
}

function mobileNodeCenter(id) {
  const el = document.getElementById(`mob-node-${id}`);
  if (!el) return null;
  return { x: parseFloat(el.style.left), y: parseFloat(el.style.top) };
}

function drawMobilePan() {
  if (!panAnim) return;
  panCtx.clearRect(0, 0, WORLD_W, WORLD_H);
  panT += 0.003;
  edges.forEach(([a, b], i) => {
    const p1 = mobileNodeCenter(a);
    const p2 = mobileNodeCenter(b);
    if (!p1 || !p2) return;
    const isGold    = a === 'main'    || b === 'main';
    const isCapital = a === 'capital' || b === 'capital';
    const grad = panCtx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
    if (isGold) { grad.addColorStop(0,'rgba(138,106,42,0.5)'); grad.addColorStop(1,'rgba(138,106,42,0.08)'); }
    else if (isCapital) { grad.addColorStop(0,'rgba(42,79,138,0.42)'); grad.addColorStop(1,'rgba(42,79,138,0.06)'); }
    else { grad.addColorStop(0,'rgba(0,0,0,0.12)'); grad.addColorStop(1,'rgba(0,0,0,0.03)'); }
    panCtx.beginPath(); panCtx.moveTo(p1.x,p1.y); panCtx.lineTo(p2.x,p2.y);
    panCtx.strokeStyle = grad; panCtx.lineWidth = 1.5; panCtx.stroke();
    const phase = (panT * 0.55 + i * 0.41) % 1;
    const dotX  = p1.x + (p2.x - p1.x) * phase;
    const dotY  = p1.y + (p2.y - p1.y) * phase;
    const alpha = 0.5 + Math.sin(phase * Math.PI) * 0.5;
    panCtx.beginPath(); panCtx.arc(dotX, dotY, 2.5, 0, Math.PI * 2);
    if (isGold) panCtx.fillStyle = `rgba(138,106,42,${alpha})`;
    else if (isCapital) panCtx.fillStyle = `rgba(42,79,138,${alpha})`;
    else panCtx.fillStyle = `rgba(0,0,0,${alpha * 0.3})`;
    panCtx.fill();
  });
  requestAnimationFrame(drawMobilePan);
}

// ════════════════════════════════════════════════════════
//  Responsive init
// ════════════════════════════════════════════════════════
function init() {
  const prompt = document.getElementById('rotate-prompt');

  if (isPortraitMobile()) {
    prompt.style.display = 'flex';
    panViewport.style.display = 'none';
    desktopAnim = false; panAnim = false;

  } else if (isLandscapeMobile()) {
    prompt.style.display = 'none';
    desktopAnim = false;
    buildMobilePan();
    if (!panAnim) {
      panAnim = true;
      requestAnimationFrame(drawMobilePan);
    }

  } else {
    prompt.style.display = 'none';
    panViewport.style.display = 'none';
    panAnim = false;
    buildDesktop();
    resizeDesktopCanvas();
    if (!desktopAnim) {
      desktopAnim = true;
      setTimeout(() => requestAnimationFrame(drawDesktop), 200);
    }
  }
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { resizeDesktopCanvas(); init(); }, 150);
});

if (_isAuthed()) init();

// ════════════════════════════════════════════════════════
//  Clock + live count
// ════════════════════════════════════════════════════════
function updateClock() {
  const el = document.getElementById('clock');
  el.textContent = new Date().toLocaleTimeString('en-US', {
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false, timeZone: 'America/New_York'
  }) + ' ET';
}
setInterval(updateClock, 1000);
updateClock();

const live = nodes.filter(n => n.status === 'live').length;
document.getElementById('liveCount').textContent = `${live} live`;
</script>
</body>
