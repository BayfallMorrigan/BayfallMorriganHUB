<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bayfall Morrigan: Proprietary Material Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f6;
    --bg2: #f2f0ec;
    --surface: rgba(0,0,0,0.03);
    --border: #ccc9c2;
    --border-mid: #b5b2aa;
    --black: #080808;
    --mid: #7a7670;
    --rule: #ccc9c2;

    --gold: #8a6a2a;
    --gold-dim: rgba(138,106,42,0.1);
    --gold-glow: rgba(138,106,42,0.22);
    --gold-line: rgba(138,106,42,0.4);

    --accent: #2a4f8a;
    --accent-dim: rgba(42,79,138,0.08);
    --accent-line: rgba(42,79,138,0.35);

    --live: #3d7a50;
    --offline: #aaa8a3;
    --amber: #8a5e2a;

    --display: 'Cormorant Garamond', Georgia, serif;
    --body: 'EB Garamond', Georgia, serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: var(--body);
    color: var(--black);
    overflow: hidden;
    cursor: default;
    -webkit-font-smoothing: antialiased;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 52px;
    height: 72px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg);
  }
  .logo {
    font-family: var(--display);
    font-size: 1.15rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--black);
  }
  .logo span {
    font-family: var(--body);
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid);
    margin-left: 14px;
  }
  .header-right {
    display: flex; align-items: center; gap: 28px;
    font-family: var(--body);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--mid);
  }
  .live-badge {
    display: flex; align-items: center; gap: 7px;
  }
  .live-badge::before {
    content: '';
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--live);
    animation: blink 2.5s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  #canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* subtle grid texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
  }

  .node {
    position: fixed;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
  }
  .node-card {
    position: relative;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--bg);
    min-width: 148px;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.18s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .node:hover .node-card {
    transform: scale(1.035);
    border-color: var(--border-mid);
    box-shadow: 0 4px 18px rgba(0,0,0,0.1);
  }

  /* Main node */
  .node.main .node-card {
    border-color: var(--gold);
    min-width: 190px;
    padding: 18px 22px;
    box-shadow: 0 2px 12px var(--gold-dim);
  }
  .node.main:hover .node-card {
    box-shadow: 0 4px 24px var(--gold-glow);
  }

  /* Capital node */
  .node.capital .node-card {
    border-color: var(--accent);
    min-width: 168px;
    box-shadow: 0 2px 12px var(--accent-dim);
  }
  .node.capital:hover .node-card {
    box-shadow: 0 4px 22px rgba(42,79,138,0.16);
  }

  /* Python tool node */
  .node.python-tool .node-card {
    border-color: rgba(138,94,42,0.45);
    box-shadow: 0 1px 6px rgba(138,94,42,0.06);
  }
  .node.python-tool:hover .node-card {
    border-color: rgba(138,94,42,0.75);
    box-shadow: 0 4px 16px rgba(138,94,42,0.14);
  }
  .node.python-tool .node-label { color: var(--amber); }

  /* Docs node */
  .node.docs .node-card {
    border-color: rgba(42,106,42,0.45);
    min-width: 210px;
    box-shadow: 0 1px 6px rgba(42,106,42,0.06);
  }
  .node.docs:hover .node-card {
    border-color: rgba(42,106,42,0.75);
    box-shadow: 0 4px 16px rgba(42,106,42,0.14);
  }
  .node.docs .node-label { color: #2a5c2a; }

  .doc-list {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 0;
    border-top: 1px solid var(--border);
  }

  .doc-group-label {
    font-family: var(--body);
    font-size: 0.48rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--mid);
    padding: 7px 0 4px;
    opacity: 0.7;
  }

  .doc-item {
    display: block;
    font-family: var(--body);
    font-size: 0.6rem;
    color: var(--black);
    text-decoration: none;
    padding: 5px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    line-height: 1.35;
    transition: color 0.15s;
    cursor: pointer;
  }
  .doc-item:last-child { border-bottom: none; }
  .doc-item:hover { color: #2a5c2a; }

  .doc-item-sub {
    font-size: 0.5rem;
    color: var(--mid);
    display: block;
    margin-top: 1px;
  }

  .doc-item-tag {
    font-size: 0.45rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.25);
    margin-left: 5px;
  }

  .badge {
    position: absolute; top: -9px; right: 12px;
    font-family: var(--body);
    font-size: 0.5rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--bg); background: var(--accent);
    padding: 2px 7px; border-radius: 1px;
  }

  .node-label {
    font-family: var(--display);
    font-size: 1rem;
    font-weight: 400;
    color: var(--black);
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .node.main .node-label {
    font-size: 1.2rem;
    color: var(--gold);
    font-style: italic;
  }
  .node.capital .node-label { color: var(--accent); }

  .node-desc {
    font-family: var(--body);
    font-size: 0.62rem;
    color: var(--mid);
    letter-spacing: 0.02em;
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .node-footer {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }

  .status {
    display: flex; align-items: center; gap: 5px;
    font-family: var(--body);
    font-size: 0.56rem; letter-spacing: 0.1em; text-transform: uppercase;

  .status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .status.live { color: var(--live); }
  .status.live .status-dot { background: var(--live); }
  .status.offline { color: var(--offline); }
  .status.offline .status-dot { background: var(--offline); }
  .status.download { color: var(--amber); }
  .status.download .status-dot { background: var(--amber); }

  .node-type {
    font-family: var(--body);
    font-size: 0.53rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(0,0,0,0.2);
  }

  .open-hint {
    position: absolute; bottom: -22px; left: 50%;
    transform: translateX(-50%);
    font-family: var(--body);
    font-size: 0.52rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--mid); white-space: nowrap;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .node:hover .open-hint { opacity: 1; }

  /* ────────────────────────────────────────────
     MOBILE — portrait: show rotate prompt

  @media (max-width: 900px) and (orientation: portrait) {

    body > .node, #canvas { display: none !important; }

  .mob-row.docs-row .mob-accent-bar     { background: rgba(42,106,42,0.6); }
  .mob-row.contract-row .mob-accent-bar { background: rgba(138,94,42,0.6); }

  .mob-row-body {

  .mob-row-title {

  .mob-row.main-row .mob-row-title   { color: var(--gold); font-style: italic; }
  .mob-row.capital-row .mob-row-title { color: var(--accent); }
  .mob-row.docs-row .mob-row-title    { color: #2a5c2a; }

  .mob-row-desc {
    font-family: var(--body);
    font-size: 0.68rem;
    color: var(--mid);
    line-height: 1.5;
    margin-bottom: 8px;

  .mob-row-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .mob-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--body);
    font-size: 0.56rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .mob-status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .mob-status.live   { color: var(--live); }
  .mob-status.live .mob-status-dot { background: var(--live); }
  .mob-status.download { color: var(--amber); }
  .mob-status.download .mob-status-dot { background: var(--amber); }

  .mob-row-type {
    font-family: var(--body);
    font-size: 0.52rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.2);
  }

  .mob-arrow {
    display: flex;
    align-items: center;
    padding: 0 14px 0 8px;
    font-size: 0.75rem;
    color: var(--mid);
    flex-shrink: 0;
  }

  /* Doc sub-items inside a mob-row */
  .mob-doc-list {
    margin-top: 10px;
    border-top: 1px solid var(--border);

  }

  .mob-doc-item {

    align-items: center;
    justify-content: space-between;

<script>
// ════════════════════════════════════════════════════════
//  SECURITY — SHA-256 hashed password, lockout, hardened session
// ════════════════════════════════════════════════════════
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12') e.preventDefault();
  if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) e.preventDefault();
  if (e.ctrlKey && e.key === 'U') e.preventDefault();
});

const _PH  = '9cd0d30d5bc77e21b8d0c808ca8cdfa8b2ef3ea51c9ee942e0463260c03a3946';
const _SK  = 'hub_e392aff8326a08ebc7b3b3e68787dd69';
const _LK  = 'hub_lock';
const _FA  = 'hub_fails';
const _MAX = 5;
const _LMS = 5 * 60 * 1000;

async function _hash(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function _genToken() {
  const a = new Uint8Array(32); crypto.getRandomValues(a);
  return Array.from(a).map(b => b.toString(16).padStart(2,'0')).join('');
}
function _isLocked()    { return Date.now() < parseInt(sessionStorage.getItem(_LK)||'0'); }
function _remaining()   { return Math.max(0, Math.ceil((parseInt(sessionStorage.getItem(_LK)||'0') - Date.now()) / 1000)); }
function _isAuthed()    { const t = sessionStorage.getItem(_SK); return t && /^[0-9a-f]{64}$/.test(t); }
function _setAuthed()   { sessionStorage.setItem(_SK, _genToken()); sessionStorage.removeItem(_LK); sessionStorage.removeItem(_FA); }

async function _checkPW() {
  if (_isLocked()) {
    document.getElementById('pw-error').textContent = `Too many attempts. Wait ${_remaining()}s.`;
    return;
  }
  const input = document.getElementById('pw-input').value;
  document.getElementById('pw-input').value = '';
  const h = await _hash(input);
  if (h === _PH) {
    _setAuthed();
    document.getElementById('pw-overlay').style.display = 'none';
    init();
  } else {
    const f = parseInt(sessionStorage.getItem(_FA)||'0') + 1;
    sessionStorage.setItem(_FA, f);
    if (f >= _MAX) {
      sessionStorage.setItem(_LK, Date.now() + _LMS);
      document.getElementById('pw-error').textContent = 'Too many attempts. Locked for 5 minutes.';
    } else {
      document.getElementById('pw-error').textContent = `Incorrect. ${_MAX - f} attempt${_MAX - f !== 1 ? 's' : ''} remaining.`;
    }
    document.getElementById('pw-input').focus();
  }
}

// Skip lock screen if already authenticated this session
if (_isAuthed()) {
  document.getElementById('pw-overlay').style.display = 'none';
}

// ════════════════════════════════════════════════════════
//  Orientation helpers
// ════════════════════════════════════════════════════════
function isPortraitMobile() {
  return window.innerWidth < 900 && window.innerHeight > window.innerWidth;
}
function isLandscapeMobile() {
  return window.innerWidth < 1024 && window.innerHeight <= window.innerWidth && window.innerHeight < 520;
}
function isMobile() {
  return isPortraitMobile() || isLandscapeMobile();
}

function handleClick(n) {
  if (n.docs) return; // links inside the card handle navigation
  if (n.download) {
    const a = document.createElement('a');
    a.href = n.download; a.download = '';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  } else if (n.url) {
    window.open(n.url, '_blank');
  }
}

function nodeCardHTML(n) {
  if (n.docs) {
    const links = n.docs.map(d => d.download
      ? `<a class="doc-item" href="${d.url}" download target="_blank">
          ${d.title}${d.tag ? `<span class="doc-item-tag">${d.tag}</span>` : ''}
          <span class="doc-item-sub">${d.sub} ↓</span>
        </a>`
      : `<a class="doc-item" href="${d.url}" target="_blank">
          ${d.title}${d.tag ? `<span class="doc-item-tag">${d.tag}</span>` : ''}
          <span class="doc-item-sub">${d.sub}</span>
        </a>`
    ).join('');
    return `
      <div class="node-card">
        <div class="node-label">${n.label}</div>
        <div class="node-desc">${n.desc}</div>
        <div class="doc-list">${links}</div>
      </div>
    `;
  }
  if (n.id === 'docs') return ''; // safety fallback
  return `
    <div class="node-card">
      ${n.badge ? `<div class="badge">${n.badge}</div>` : ''}
      <div class="node-label">${n.label}</div>
      <div class="node-desc">${n.desc}</div>
      <div class="node-footer">
        <div class="status ${n.status}">
          <div class="status-dot"></div>${n.status}
        </div>
        <div class="node-type">${n.type}</div>
      </div>
    </div>
    <div class="open-hint">${n.download ? '↓ download zip' : '↗ open'}</div>
  `;
}

// ════════════════════════════════════════════════════════
//  DESKTOP — fixed-position nodes + animated canvas
// ════════════════════════════════════════════════════════
const desktopCanvas = document.getElementById('canvas');
const desktopCtx    = desktopCanvas.getContext('2d');
let desktopT = 0;
let desktopAnim = false;

function buildDesktop() {
  document.querySelectorAll('#mobile-pan-world .node').forEach(el => el.remove());
  nodes.forEach(n => {
    let el = document.getElementById(`node-${n.id}`);
    if (!el) {
      el = document.createElement('div');
      el.className = `node ${n.cls || ''}`;
      el.id = `node-${n.id}`;
      el.addEventListener('click', () => handleClick(n));
      document.body.appendChild(el);
    }
    el.style.left = n.pos[0] + 'vw';
    el.style.top  = n.pos[1] + 'vh';
    el.style.position = 'fixed';
    el.style.display  = '';
    el.innerHTML = nodeCardHTML(n);
  });
}

function desktopNodeCenter(id) {
  const el = document.getElementById(`node-${id}`);
  if (!el) return null;
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function drawDesktop() {
  if (!desktopAnim) return;
  desktopCtx.clearRect(0, 0, desktopCanvas.width, desktopCanvas.height);
  desktopT += 0.003;
  edges.forEach(([a, b], i) => {
    const p1 = desktopNodeCenter(a);
    const p2 = desktopNodeCenter(b);
    if (!p1 || !p2) return;
    const isGold    = a === 'main'    || b === 'main';
    const isCapital = a === 'capital' || b === 'capital';
    const grad = desktopCtx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
    if (isGold) { grad.addColorStop(0,'rgba(138,106,42,0.5)'); grad.addColorStop(1,'rgba(138,106,42,0.08)'); }
    else if (isCapital) { grad.addColorStop(0,'rgba(42,79,138,0.42)'); grad.addColorStop(1,'rgba(42,79,138,0.06)'); }
    else { grad.addColorStop(0,'rgba(0,0,0,0.12)'); grad.addColorStop(1,'rgba(0,0,0,0.03)'); }
    desktopCtx.beginPath(); desktopCtx.moveTo(p1.x,p1.y); desktopCtx.lineTo(p2.x,p2.y);
    desktopCtx.strokeStyle = grad; desktopCtx.lineWidth = 1; desktopCtx.stroke();
    const phase = (desktopT * 0.55 + i * 0.41) % 1;
    const dotX  = p1.x + (p2.x - p1.x) * phase;
    const dotY  = p1.y + (p2.y - p1.y) * phase;
    const alpha = 0.5 + Math.sin(phase * Math.PI) * 0.5;
    desktopCtx.beginPath(); desktopCtx.arc(dotX, dotY, 2.2, 0, Math.PI * 2);
    if (isGold) desktopCtx.fillStyle = `rgba(138,106,42,${alpha})`;
    else if (isCapital) desktopCtx.fillStyle = `rgba(42,79,138,${alpha})`;
    else desktopCtx.fillStyle = `rgba(0,0,0,${alpha * 0.3})`;
    desktopCtx.fill();
  });
  requestAnimationFrame(drawDesktop);
}

function resizeDesktopCanvas() {
  desktopCanvas.width  = window.innerWidth;
  desktopCanvas.height = window.innerHeight;
}

const mobileList = document.getElementById('mobile-list');

const mobGroups = [
  { label: 'Core', ids: ['main', 'capital'], rowCls: '' },
  { label: 'Documentation', ids: ['docs-whitepapers', 'docs-legal'], rowCls: 'docs-row' },
  { label: 'Client Contracts', ids: ['contracts'], rowCls: 'contract-row' },
  { label: 'Databases', ids: ['databases'], rowCls: 'docs-row' },
  { label: 'Trading Tools', ids: ['montecarlo', 'accsim1', 'accsim2', 'abuyield'], rowCls: '' },
  { label: 'Python Tools', ids: ['dailymover', 'backtest'], rowCls: '' },
];

function buildMobileList() {
  mobileList.innerHTML = '';
  mobGroups.forEach(group => {
    const groupNodes = group.ids.map(id => nodes.find(n => n.id === id)).filter(Boolean);
    if (!groupNodes.length) return;

    const section = document.createElement('div');
    section.className = 'mob-section';

    const label = document.createElement('div');
    label.className = 'mob-section-label';
    label.textContent = group.label;
    section.appendChild(label);

    groupNodes.forEach(n => {
      const rowCls = n.cls === 'main' ? 'main-row' : n.cls === 'capital' ? 'capital-row' : group.rowCls;

      if (n.docs) {
        // Expandable doc/contract card
        const row = document.createElement('div');
        row.className = `mob-row ${rowCls}`;
        row.innerHTML = `
          <div class="mob-accent-bar"></div>
          <div class="mob-row-body">
            <div class="mob-row-title">${n.label}</div>
            <div class="mob-row-desc">${n.desc}</div>
            <div class="mob-doc-list">
              ${n.docs.map(d => `
                <a class="mob-doc-item" href="${d.url}" ${d.download ? 'download' : 'target="_blank"'}>
                  <div>
                    <div class="mob-doc-title">${d.title}${d.tag ? `<span class="mob-doc-tag">${d.tag}</span>` : ''}</div>
                    <span class="mob-doc-sub">${d.sub}</span>
                  </div>
                  <span class="mob-doc-arrow">${d.download ? '↓' : '↗'}</span>
                </a>`).join('')}
            </div>
          </div>`;
        section.appendChild(row);

      } else {
        // Tappable single-action row
        const row = document.createElement('div');
        row.className = `mob-row ${rowCls}`;
        row.innerHTML = `
          <div class="mob-accent-bar"></div>
          <div class="mob-row-body">
            <div class="mob-row-title">${n.label}${n.badge ? ` <span style="font-family:var(--body);font-size:0.48rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-left:6px;">${n.badge}</span>` : ''}</div>
            <div class="mob-row-desc">${n.desc}</div>
            <div class="mob-row-footer">
              <div class="mob-status ${n.status}">
                <div class="mob-status-dot"></div>${n.status}
              </div>
              <div class="mob-row-type">${n.type}</div>
            </div>
          </div>
          <div class="mob-arrow">${n.download ? '↓' : '↗'}</div>`;
        row.addEventListener('click', () => handleClick(n));
        section.appendChild(row);
      }
    });

    mobileList.appendChild(section);
  });

  mobileList.style.display = 'block';
}

// ════════════════════════════════════════════════════════
//  Responsive init
// ════════════════════════════════════════════════════════
function init() {
  if (isMobile()) {
    desktopAnim = false;
    buildMobileList();
  } else {
    mobileList.style.display = 'none';
    buildDesktop();
    resizeDesktopCanvas();
    if (!desktopAnim) {
      desktopAnim = true;
      setTimeout(() => requestAnimationFrame(drawDesktop), 200);
    }
  }
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { resizeDesktopCanvas(); init(); }, 150);
});

if (_isAuthed()) init();

  el.textContent = new Date().toLocaleTimeString('en-US', {
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false, timeZone: 'America/New_York'
  }) + ' ET';
}
setInterval(updateClock, 1000);
updateClock();
